<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>feZsy's Library</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #333;
            --accent: #F25A00;
        }

        body {
            font-family: -apple-system, "PingFang SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            line-height: 1.6;
        }

        h1 {
            font-size: 24px;
            border-bottom: 2px solid var(--text);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .quote {
            font-style: italic;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .book-list {
            list-style: none;
            padding: 0;
        }

        .book-item {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            display: block;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
        }

        .book-item:hover {
            border-color: var(--accent);
            background: #fffaf8;
            transform: translateY(-2px);
        }

        .book-title {
            font-weight: bold;
            display: block;
        }

        .book-meta {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <h1>📚 feZsy 的数字资产库</h1>
    <div class="quote">“做正确的事，把事做正确。” —— 读《段永平投资问答录》感</div>

    <div class="book-list">
        <!-- 以后每加一本书，就复制下面这个 <a> 标签 -->
        <a href="./books/段永平投资问答录.pdf" class="book-item">
            <span class="book-title">段永平投资问答录 (投资逻辑篇)</span>
            <span class="book-meta">财经 / PDF / 重点推荐</span>
        </a>

        <!-- 占位示例 -->
        <div class="book-item" style="opacity: 0.5;">
            <span class="book-title">更多书籍录入中...</span>
        </div>
    </div>
</body>

</html>
