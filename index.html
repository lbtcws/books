<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私藏书架 - feZsy</title>
    <style>
        :root { --sidebar-width: 280px; --text-main: #333; --accent: #F25A00; }
        body { margin: 0; display: flex; font-family: -apple-system, system-ui, sans-serif; color: var(--text-main); background: #f9f9f9; height: 100vh; overflow: hidden; }
        
        /* 左侧菜单 */
        #sidebar { width: var(--sidebar-width); background: #fff; border-right: 1px solid #eee; padding: 20px; overflow-y: auto; flex-shrink: 0; }
        h2 { font-size: 18px; margin-bottom: 20px; border-bottom: 2px solid var(--text-main); padding-bottom: 8px; }
        
        /* 树形结构 */
        .category { font-weight: bold; cursor: pointer; padding: 8px 0; display: block; user-select: none; }
        .category::before { content: "▶"; display: inline-block; margin-right: 8px; font-size: 10px; transition: transform 0.2s; }
        .category.open::before { transform: rotate(90deg); }
        .book-list { list-style: none; padding-left: 20px; margin: 0; display: none; }
        .book-list.open { display: block; }
        .book-item { padding: 6px 0; font-size: 14px; font-weight: normal; cursor: pointer; color: #666; transition: color 0.2s; }
        .book-item:hover { color: var(--accent); }

        /* 右侧内容区 */
        #content { flex-grow: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #999; font-style: italic; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 30vh; border-right: none; border-bottom: 1px solid #eee; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>我的资产库</h2>
    <div id="tree-container">加载中...</div>
</div>

<div id="content">
    <div class="empty-state" id="placeholder">请从左侧选择书籍阅读</div>
    <iframe id="reader" src="" style="display: none;"></iframe>
</div>

<script>
    // 获取数据并渲染
    fetch('./books_data.json')
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';
            
            for (let category in data) {
                // 创建分类
                const catDiv = document.createElement('div');
                catDiv.className = 'category';
                catDiv.innerText = category;
                
                // 创建书籍列表
                const ul = document.createElement('ul');
                ul.className = 'book-list';
                
                data[category].forEach(book => {
                    const li = document.createElement('li');
                    li.className = 'book-item';
                    li.innerText = book.replace(/\.[^/.]+$/, ""); // 去掉后缀显示
                    li.onclick = (e) => {
                        e.stopPropagation();
                        loadBook(`./books/${category}/${book}`);
                    };
                    ul.appendChild(li);
                });
                
                // 折叠逻辑
                catDiv.onclick = () => {
                    catDiv.classList.toggle('open');
                    ul.classList.toggle('open');
                };
                
                container.appendChild(catDiv);
                container.appendChild(ul);
            }
        });

    function loadBook(path) {
        document.getElementById('placeholder').style.display = 'none';
        const reader = document.getElementById('reader');
        reader.src = path;
        reader.style.display = 'block';
    }
</script>
</body>
</html>
