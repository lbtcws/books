<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>码外人生 | feZsy's Insight Hub</title>

    <!-- 引用你下载到本地 lib 目录下的库 -->
    <link rel="stylesheet" href="./lib/github-markdown.min.css">
    <script src="./lib/marked.min.js"></script>

    <style>
        :root {
            --sidebar-width: 280px;
            --accent: #F25A00;
            --sidebar-bg: #ffffff;
            --footer-bg: #f8f9fa;
            --content-bg: #ffffff;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, "PingFang SC", sans-serif;
            background: #fff;
            color: #333;
        }

        /* --- 侧边栏 --- */
        #sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: var(--sidebar-bg);
            border-right: none;
            display: flex;
            flex-direction: column;
            transition: margin-left var(--transition);
            flex-shrink: 0;
            z-index: 30;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.02);
        }

        body.collapsed #sidebar {
            margin-left: calc(var(--sidebar-width) * -1 - 5px);
        }

        #module-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15px;
        }

        .module-label {
            font-size: 11px;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 12px;
            font-weight: bold;
        }

        .sidebar-footer {
            height: 50px;
            background: var(--footer-bg);
            border-top: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
            color: #444;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        /* --- 树形菜单 --- */
        .tree-category {
            padding: 10px 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            border-radius: 6px;
            font-size: 14px;
        }

        .tree-category:hover {
            background: #f5f5f5;
        }

        .tree-category::before {
            content: '▸';
            margin-right: 8px;
            transition: 0.2s;
        }

        .tree-category.open::before {
            transform: rotate(90deg);
        }

        .tree-list {
            display: none;
            list-style: none;
            padding-left: 20px;
            margin: 0;
        }

        .tree-list.open {
            display: block;
        }

        .tree-item {
            padding: 8px 12px;
            font-size: 13px;
            color: #555;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .tree-item:hover {
            color: var(--accent);
            background: #fff5f0;
        }

        /* --- 主视口 --- */
        #main-viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--content-bg);
            min-width: 0;
            position: relative;
        }

        /* --- 按钮 & Tooltip --- */
        #toggle-btn {
            position: absolute;
            bottom: 9px;
            left: 10px;
            z-index: 100;
            width: 32px;
            height: 32px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        body.collapsed #toggle-btn svg {
            transform: rotate(180deg);
        }

        [data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            background: #333;
            color: #fff;
            font-size: 11px;
            padding: 6px 12px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
            z-index: 110;
            bottom: 42px;
            left: 0;
        }

        [data-tooltip]:hover::after {
            opacity: 1;
            transform: translateY(-5px);
        }

        /* --- 摘要面板 --- */
        #info-panel {
            padding: 20px 40px 20px 60px;
            background: #fffaf8;
            border-bottom: 1px solid #f0f0f0;
            position: relative;
            display: none;
        }

        .close-panel-btn {
            position: absolute;
            right: 20px;
            top: 15px;
            cursor: pointer;
            padding: 4px 12px;
            font-size: 11px;
            color: #999;
            border: 1px solid #eee;
            border-radius: 20px;
            background: #fff;
        }

        .summary-content {
            color: #666;
            line-height: 1.6;
            font-size: 14px;
            border-left: 3px solid var(--accent);
            padding-left: 15px;
            margin-top: 10px;
            white-space: pre-wrap;
        }

        /* --- 渲染区域容器 --- */
        #render-container {
            flex: 1;
            background: #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Markdown 滚动层 */
        #md-wrapper {
            flex: 1;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            display: none;
            background: #fff;
            -webkit-overflow-scrolling: touch;
        }

        .markdown-body {
            max-width: 880px;
            margin: 0 auto;
            padding: 45px;
            background: transparent !important;
            font-size: 16px;
            line-height: 1.8;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: #fff;
        }

        #download-card {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 30px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        #floating-action-trigger {
            position: absolute;
            right: 25px;
            bottom: 25px;
            z-index: 90;
            cursor: pointer;
            background: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 1px solid #eee;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            font-size: 20px;
        }

        .empty-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #bbb;
            font-style: italic;
            text-align: center;
            line-height: 1.8;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <div id="module-container">
            <div class="module-label">Assets / 数字资产</div>
            <div id="book-tree"></div>
        </div>
        <div class="sidebar-footer"><span style="margin-left: 35px;">码外人生</span></div>
    </div>

    <button id="toggle-btn" onclick="toggleSidebar()" data-tooltip="收起菜单">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
            <path
                d="M12.452 4.516a.75.75 0 010 1.06l-4.44 4.424 4.44 4.424a.75.75 0 11-1.06 1.06l-4.97-4.954a.75.75 0 010-1.06l4.97-4.954a.75.75 0 011.06 0z" />
        </svg>
    </button>

    <div id="main-viewport">
        <div id="info-panel">
            <div class="close-panel-btn" onclick="setPanelVisible(false)">关闭</div>
            <h2 id="item-title" style="margin:0; font-size: 1.1rem; color: #000;"></h2>
            <div class="summary-content" id="item-summary"></div>
        </div>

        <div id="render-container">
            <div id="floating-action-trigger" onclick="setPanelVisible(true)" data-tooltip="查看详情">💡</div>
            <div class="empty-placeholder" id="welcome-msg">码外人生，求真务实<br>开启深度阅读与思考</div>

            <iframe id="pdf-viewer"></iframe>

            <!-- 【重点检查】此处 ID 必须与脚本中的 mdWrapper 和 mdBody 对应 -->
            <div id="md-wrapper">
                <div id="md-content" class="markdown-body"></div>
            </div>

            <div id="download-card">
                <div style="font-size:64px;margin-bottom:20px;">📖</div>
                <h3 id="download-title"></h3>
                <p>EPUB 格式建议下载后阅读</p>
                <a href="#" id="actual-download-link" class="download-btn" download>立即获取</a>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const isCollapsed = document.body.classList.toggle('collapsed');
            document.getElementById('toggle-btn').setAttribute('data-tooltip', isCollapsed ? '展开菜单' : '收起菜单');
        }

        function setPanelVisible(visible) {
            const panel = document.getElementById('info-panel');
            const trigger = document.getElementById('floating-action-trigger');
            if (visible) { panel.style.display = 'block'; trigger.style.display = 'none'; }
            else { panel.style.display = 'none'; if (document.getElementById('welcome-msg').style.display === 'none') trigger.style.display = 'flex'; }
        }

        fetch('./books_data.json').then(res => res.json()).then(data => {
            const treeRoot = document.getElementById('book-tree');
            treeRoot.innerHTML = '';
            for (let category in data) {
                const catEl = document.createElement('div');
                catEl.className = 'tree-category open';
                catEl.textContent = category;
                const listEl = document.createElement('ul');
                listEl.className = 'tree-list open';
                data[category].forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'tree-item';
                    li.textContent = item.title;
                    li.onclick = (e) => {
                        e.stopPropagation();
                        renderItem(category, item);
                        if (!document.body.classList.contains('collapsed')) toggleSidebar();
                    };
                    listEl.appendChild(li);
                });
                catEl.onclick = () => { catEl.classList.toggle('open'); listEl.classList.toggle('open'); };
                treeRoot.appendChild(catEl);
                treeRoot.appendChild(listEl);
            }
        });

        function renderItem(category, item) {
            document.getElementById('welcome-msg').style.display = 'none';

            // 1. 展示概要（此时 item.summary 已经是纯净的 txt 内容或默认文案）
            document.getElementById('item-title').textContent = item.title;
            document.getElementById('item-summary').textContent = item.summary;
            setPanelVisible(true);

            const pdf = document.getElementById('pdf-viewer');
            const mdWrap = document.getElementById('md-wrapper');
            const mdBody = document.getElementById('md-content');
            const dl = document.getElementById('download-card');
            const url = `./books/${encodeURIComponent(category)}/${encodeURIComponent(item.fileName)}`;

            // 2. 切换正文显示
            [pdf, mdWrap, dl].forEach(el => { if (el) el.style.display = 'none'; });

            if (item.fileName.toLowerCase().endsWith('.md')) {
                mdWrap.style.display = 'block';
                fetch(url).then(r => r.text()).then(text => {
                    if (window.marked) {
                        mdBody.innerHTML = marked.parse(text);
                    } else {
                        mdBody.innerHTML = '<pre>' + text + '</pre>';
                    }
                    mdWrap.scrollTop = 0;
                });
            } else if (item.fileName.toLowerCase().endsWith('.epub')) {
                dl.style.display = 'flex';
                document.getElementById('download-title').textContent = item.title;
                document.getElementById('actual-download-link').href = url;
            } else {
                pdf.style.display = 'block';
                pdf.src = url;
            }
        }
    </script>
</body>

</html>
